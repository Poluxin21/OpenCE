name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de dependencias
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Publicar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: opence-windows-x64
          path: target/release/opence.exe

      # Atualiza uma release rolling "latest" a cada push na branch padrao.
      - name: Atualizar release "latest"
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>$null
          gh release create latest target/release/opence.exe `
            --title "Build mais recente" `
            --notes "Build automatica do commit ${{ github.sha }}." `
            --prerelease
