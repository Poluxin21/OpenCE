name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # OIDC para a atestacao de proveniencia (gh attest)
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # Segredos OPCIONAIS de assinatura Authenticode. Se ausentes, o passo de
      # assinatura e pulado (nao quebra o build).
      CODESIGN_PFX: ${{ secrets.CODESIGN_PFX_BASE64 }}
      CODESIGN_PWD: ${{ secrets.CODESIGN_PWD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historico completo p/ montar o changelog

      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de dependencias
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Publicar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: quarry-windows-x64
          path: target/release/quarry.exe

      # Assinatura Authenticode (opcional): so roda se o certificado estiver
      # nos secrets. Assina o binario oficial para ser verificavel/distinguivel.
      - name: Assinar binario (Authenticode, opcional)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && env.CODESIGN_PFX != ''
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:CODESIGN_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          & $signtool.FullName sign /fd SHA256 /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:CODESIGN_PWD" `
            /tr http://timestamp.digicert.com /td SHA256 target/release/quarry.exe
          Remove-Item "$env:RUNNER_TEMP\cert.pfx"

      # Proveniencia SLSA (keyless, via OIDC). Verificavel com:
      #   gh attest verify quarry.exe --owner <dono-do-repo>
      - name: Atestar proveniencia do build
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/quarry.exe

      - name: Gerar checksum SHA256
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          $h = (Get-FileHash target/release/quarry.exe -Algorithm SHA256).Hash.ToLower()
          "$h  quarry.exe" | Out-File -FilePath target/release/quarry.exe.sha256 -Encoding ascii

      # Cada push na branch padrao cria uma release NOVA (tag unica), sem
      # sobrescrever as anteriores; a mais recente vira a "Latest".
      - name: Criar nova release
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $tag = "v$ver-build.${{ github.run_number }}"
          $prev = git tag --list 'v*' --sort=-creatordate | Select-Object -First 1
          if ($prev) { $range = "$prev..HEAD" } else { $range = "HEAD" }
          $changes = (git log $range --pretty=format:'- %s (%h)') -join "`n"
          if (-not $changes) { $changes = "- (sem novos commits desde $prev)" }
          $notes = @"
          **Quarry v$ver** — build ${{ github.run_number }} ($(Get-Date -Format yyyy-MM-dd))

          ### Recursos
          - **General Exploring**: scanner de memoria, pointer scan, auto assembler, injecao de DLL
          - **Kernel Exploring**: proxy HTTPS (Historico, Intercept, Repeater, Match & Replace)
          - Deteccao de anticheat + roteamento Kernel/General

          ### Mudancas neste build
          $changes

          ### Verificacao
          - Proveniencia (SLSA): ``gh attest verify quarry.exe --owner ${{ github.repository_owner }}``
          - Checksum: confira ``quarry.exe`` contra ``quarry.exe.sha256``
          "@
          $notes | Out-File -FilePath notes.md -Encoding utf8
          gh release create $tag target/release/quarry.exe target/release/quarry.exe.sha256 `
            --target ${{ github.sha }} `
            --title "Quarry v$ver (build ${{ github.run_number }})" `
            --notes-file notes.md `
            --latest
